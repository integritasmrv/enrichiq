[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
logfile_maxbytes=50MB
loglevel=info

[program:enrichiq-api]
command=uvicorn app.api_main:app --host 0.0.0.0 --port 8088 --workers 2
directory=/app
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/enrichiq-api.log
stderr_logfile=/var/log/supervisor/enrichiq-api-err.log
stdout_logfile_maxbytes=20MB
stderr_logfile_maxbytes=20MB

[program:enrichiq-worker]
command=python -m app.worker_main
directory=/app
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/enrichiq-worker.log
stderr_logfile=/var/log/supervisor/enrichiq-worker-err.log
stdout_logfile_maxbytes=20MB
stderr_logfile_maxbytes=20MB
